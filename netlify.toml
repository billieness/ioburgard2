[build]
  base = "io-burgard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force YAML files to be served as text/yaml and not downloaded
[[headers]]
  for = "*.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "*.yaml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    X-Content-Type-Options = "nosniff"

# Disable download for YAML files
[[headers]]
  for = "/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    Content-Disposition = "inline"

# Redirects for Decap CMS
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/admin/index.html"
  status = 200
