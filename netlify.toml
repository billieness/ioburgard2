[build]
  base = "io-burgard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force YAML files to be served as text/yaml
[[headers]]
  for = "*.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"

[[headers]]
  for = "*.yaml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"

# Specific header for config.yml to ensure it's served correctly
[[headers]]
  for = "/config.yml"
  [headers.values]
    Content-Type = "text/yaml; charset=utf-8"
    X-Content-Type-Options = "nosniff"

# Redirects ONLY for admin and api paths
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
