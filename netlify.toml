[build]
  base = "io-burgard"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Enable Netlify Identity for Decap CMS
[context.production.environment]
  NETLIFY_IDENTITY_URL = "https://io-burgard.netlify.app"
  NETLIFY_IDENTITY_REDIRECT_URL = "https://io-burgard.netlify.app/admin"

# Enable Git Gateway for CMS to commit to GitHub
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/admin/index.html"
  status = 200
