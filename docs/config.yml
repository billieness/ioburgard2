backend:
  name: github
  repo: billieness/ioburgard2
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

i18n:
  structure: multiple_folders
  locales: [fr, en]
  default_locale: fr

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Accueil"
        file: "content/settings/home.yml"
        fields:
          - label: "Titre"
            name: "title"
            widget: "string"
          - label: "Contenu"
            name: "body"
            widget: "markdown"

  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: "Titre", name: "title", widget: "string", i18n: true }
      - { label: "Date", name: "date", widget: "datetime", i18n: true }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Contenu", name: "body", widget: "markdown", i18n: true }
